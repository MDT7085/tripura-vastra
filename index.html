<!-- ONLY NEW FEATURES ADDED, NOTHING REMOVED -->

<!-- ADD THIS BUTTON IN NAV -->
<button onclick="openCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>

<!-- ADD THIS CART MODAL BELOW YOUR MAIN MODAL -->
<div id="cartModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center;">
<div style="background:#fff;padding:20px;width:90%;max-width:500px;">
<h2>Your Cart</h2>
<div id="cartItems"></div>

<button onclick="sendOrder()">Order via WhatsApp</button>
<button onclick="closeCart()">Close</button>
</div>
</div>

<script>

/* CART SYSTEM */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ADD TO CART */
function addToCart(i){
let p = products[i];
cart.push(p);
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
alert("Added to cart");
}

/* UPDATE COUNT */
function updateCartCount(){
document.getElementById("cartCount").innerText = cart.length;
}

/* OPEN CART */
function openCart(){
document.getElementById("cartModal").style.display="flex";

let box=document.getElementById("cartItems");
box.innerHTML="";

cart.forEach((p,i)=>{
box.innerHTML+=`
<div style="margin:10px 0;">
${p.name} - ₹${p.price}
<button onclick="removeCart(${i})">X</button>
</div>`;
});
}

/* REMOVE */
function removeCart(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
openCart();
updateCartCount();
}

/* CLOSE */
function closeCart(){
document.getElementById("cartModal").style.display="none";
}

/* SEND ORDER */
function sendOrder(){
if(cart.length===0){alert("Cart empty");return;}

let msg="Order Details:%0A";

cart.forEach(p=>{
msg += `${p.name} - ₹${p.price}%0A`;
});

window.open(`https://wa.me/919863653392?text=${msg}`);
}

/* MODIFY RENDER BUTTON */
const oldRender = render;
render = function(){
oldRender();
updateCartCount();

/* ADD CART BUTTON TO EACH PRODUCT */
document.querySelectorAll(".card").forEach((card,i)=>{
let btn=document.createElement("button");
btn.innerText="Add to Cart";
btn.onclick=()=>addToCart(i);
card.appendChild(btn);
});
}

updateCartCount();

</script>
