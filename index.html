<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripura Vastra</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

/* NAV */
nav{display:flex;justify-content:space-between;padding:15px;background:#fff}

/* HERO */
.hero{height:250px;background:#333;color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column}

/* SEARCH */
.search-box{text-align:center;margin:20px;}
.search-box input{width:80%;padding:12px;border-radius:25px;border:1px solid #ccc}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}

/* CARD */
.card{background:#fff;border-radius:10px;overflow:hidden;text-align:center}
.card img{width:100%;height:340px;object-fit:cover}

/* BUTTON */
button{padding:10px;border:none;border-radius:5px;background:#333;color:#fff;margin:5px;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center}
.modal-box{background:#fff;width:90%;max-width:700px;display:grid;grid-template-columns:1fr 1fr}
.slider img{width:100%;height:350px;object-fit:contain;display:none}
.slider img.active{display:block}

/* ADMIN */
#admin{display:none;background:#fff;padding:20px;margin:20px}

/* REVIEW */
.review{background:#fff;margin:10px;padding:10px}

footer{text-align:center;background:#111;color:#fff;padding:20px}
</style>
</head>

<body>

<nav>
<h2>TRIPURA VASTRA</h2>
<button onclick="login()">Owner Login</button>
</nav>

<div class="hero">
<h1>Tripura Vastra</h1>
<p>(Tiprasa Kanmung-Chumung)</p>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search products..." onkeyup="render()">
</div>

<!-- ADMIN -->
<div id="admin">
<input id="name" placeholder="Product Name"><br>
<input id="price" placeholder="Price"><br>

<select id="category">
<option>Tiprasa Rignai</option>
<option>Takborok Kamchwlwi</option>
</select><br>

<input type="file" id="imgFile" multiple><br>
<button onclick="addProduct()">Add Product</button>

<hr>

<input id="banner" placeholder="Banner URL">
<button onclick="changeBanner()">Change Banner</button>

<input id="rname" placeholder="Name">
<textarea id="rtext"></textarea>
<button onclick="addReview()">Add Review</button>
</div>

<!-- PRODUCTS -->
<div id="grid" class="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<div class="slider" id="slider"></div>

<div style="padding:20px">
<h2 id="mname"></h2>
<h3 id="mprice"></h3>

<a id="upi" target="_blank"><button>UPI Pay</button></a>
<a id="wa" target="_blank"><button>WhatsApp</button></a>

<button onclick="closeModal()">Close</button>
</div>

</div>
</div>

<!-- REVIEWS -->
<div id="reviews"></div>

<footer>
<p onclick="login()" style="cursor:pointer">Owner Login</p>
</footer>

<script>
const PASS="MATINDRA";

let products=JSON.parse(localStorage.getItem("p"))||[];
let reviews=JSON.parse(localStorage.getItem("r"))||[];
let current=0;

/* LOGIN */
function login(){
if(prompt("Password")==PASS){
document.getElementById("admin").style.display="block";
}
}

/* RESIZE IMAGE */
function resizeImage(file){
return new Promise(resolve=>{
let img=new Image();
let reader=new FileReader();

reader.onload=e=>img.src=e.target.result;

img.onload=()=>{
let canvas=document.createElement("canvas");
let max=500;
let w=img.width,h=img.height;

if(w>h){if(w>max){h*=max/w;w=max}}
else{if(h>max){w*=max/h;h=max}}

canvas.width=w;
canvas.height=h;

canvas.getContext("2d").drawImage(img,0,0,w,h);
resolve(canvas.toDataURL("image/jpeg",0.7));
};

reader.readAsDataURL(file);
});
}

/* ADD PRODUCT */
async function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let cat=document.getElementById("category").value;
let files=document.getElementById("imgFile").files;

let images=[];
for(let f of files){
images.push(await resizeImage(f));
}

products.push({name,price,images,cat});
localStorage.setItem("p",JSON.stringify(products));
render();
}

/* RENDER */
function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";
let s=document.getElementById("search").value.toLowerCase();

products.forEach((p,i)=>{
if(!p.name.toLowerCase().includes(s)) return;

let adminBtn = document.getElementById("admin").style.display==="block"
? `<button onclick="editProduct(${i})">Edit</button>
   <button onclick="deleteProduct(${i})">Delete</button>`:"";

grid.innerHTML+=`
<div class="card">
<img src="${p.images[0]}" onclick="openModal(${i})">
<h3>${p.name}</h3>
<p>${p.cat}</p>
<p>₹${p.price}</p>
<button onclick="openModal(${i})">View</button>
${adminBtn}
</div>`;
});

let rbox=document.getElementById("reviews");
rbox.innerHTML="";
reviews.forEach(r=>{
rbox.innerHTML+=`<div class="review"><b>${r.name}</b><p>${r.text}</p></div>`;
});
}

/* MODAL */
function openModal(i){
let p=products[i];
let slider=document.getElementById("slider");
slider.innerHTML="";

p.images.forEach((img,idx)=>{
slider.innerHTML+=`<img src="${img}" class="${idx===0?'active':''}">`;
});

document.getElementById("mname").innerText=p.name;
document.getElementById("mprice").innerText="₹"+p.price;

document.getElementById("wa").href=
`https://wa.me/919863653392?text=I want to buy ${p.name} ₹${p.price}`;

document.getElementById("upi").href=
`upi://pay?pa=matindratripura911-1@okaxis&pn=Tripura&am=${p.price}&cu=INR`;

document.getElementById("modal").style.display="flex";
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* DELETE */
function deleteProduct(i){
if(confirm("Delete?")){
products.splice(i,1);
localStorage.setItem("p",JSON.stringify(products));
render();
}
}

/* EDIT */
function editProduct(i){
let p=products[i];
p.name=prompt("Name",p.name);
p.price=prompt("Price",p.price);
localStorage.setItem("p",JSON.stringify(products));
render();
}

/* REVIEW */
function addReview(){
let name=document.getElementById("rname").value;
let text=document.getElementById("rtext").value;
reviews.push({name,text});
localStorage.setItem("r",JSON.stringify(reviews));
render();
}

/* BANNER */
function changeBanner(){
let url=document.getElementById("banner").value;
document.querySelector(".hero").style.background=`url(${url}) center/cover`;
}

render();
</script>

</body>
</html>
