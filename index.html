<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiprasa Vhastra</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0a0a0a;
  color:white;
}

header {
  padding:15px;
  text-align:center;
  font-size:24px;
  color:gold;
  font-weight:bold;
  position:sticky;
  top:0;
  background:#000;
}

.hero {
  text-align:center;
  padding:60px 20px;
}

.hero h1 {
  font-size:32px;
}

button {
  padding:10px 20px;
  background:gold;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  border-radius:10px;
}

.cart {
  position:fixed;
  right:10px;
  top:10px;
  background:gold;
  color:black;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

.cart-box {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:20px;
  display:none;
  overflow:auto;
}

.admin {
  position:fixed;
  bottom:10px;
  left:10px;
  background:red;
  padding:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>TIPRASA VHASTRA</header>

<div class="cart" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="hero">
<h1>Wear Your Roots. Rule Your Style.</h1>
</div>

<div class="products" id="products"></div>

<div class="cart-box" id="cartBox">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<button onclick="checkout()">Checkout</button>
</div>

<div class="admin" onclick="adminPanel()">Admin</div>

<script>

let products = [
  {
    name:"Tribal T-Shirt",
    price:799,
    img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
  },
  {
    name:"Black Hoodie",
    price:1499,
    img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf"
  },
  {
    name:"Minimal Tee",
    price:699,
    img:"https://images.unsplash.com/photo-1583743814966-8936f37f4678"
  }
];

let cart = [];

function displayProducts(){
  let container = document.getElementById("products");
  container.innerHTML="";
  products.forEach((p,i)=>{
    container.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${i})">Add to Cart</button>
    </div>`;
  });
}

function addToCart(i){
  cart.push(products[i]);
  document.getElementById("count").innerText = cart.length;
  renderCart();
}

function toggleCart(){
  let box=document.getElementById("cartBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

function renderCart(){
  let items=document.getElementById("cartItems");
  items.innerHTML="";
  cart.forEach(item=>{
    items.innerHTML+=`<p>${item.name} - ₹${item.price}</p>`;
  });
}

function checkout(){
  alert("Demo checkout. Use Razorpay/Stripe for real payments.");
}

function adminPanel(){
  let name=prompt("Product name:");
  let price=prompt("Price:");
  let img=prompt("Image URL:");
  if(name && price && img){
    products.push({name,price,img});
    displayProducts();
  }
}

displayProducts();

</script>

</body>
</html>
